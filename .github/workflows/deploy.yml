name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Or your default branch name

# Set the correct permissions for GitHub Pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Project
        run: VITE_STATIC_EXPORT=true bun run build

      - name: Setup SPA Routing
        # Copies index.html to 404.html in the client distribution folder 
        # so GH pages knows how to handle React Router links directly!
        run: cp dist/client/index.html dist/client/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client # TanStack Start's static SPA output folder
